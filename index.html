<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Deck - Ultimate Version</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #6f4ef0;
            --secondary-glow: #a287ff;
            --bg-dark: #050811;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* --- BACKGROUND EFFECTS --- */
        .stars-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1B2735 0%, #050811 100%);
        }

        .dust {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: shimmer 3s infinite ease-in-out;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .star {
            position: absolute;
            height: 2px;
            background: linear-gradient(-45deg, var(--secondary-glow), rgba(0, 0, 255, 0));
            filter: drop-shadow(0 0 6px var(--secondary-glow));
            animation: tail 3s ease-in-out infinite, shooting 3s ease-in-out infinite;
        }

        @keyframes tail { 0% { width: 0; } 30% { width: 100px; } 100% { width: 0; } }
        @keyframes shooting { 0% { transform: translateX(0) translateY(0); } 100% { transform: translateX(400px) translateY(200px); } }

        /* --- MAIN CARD --- */
        .container {
            width: 95%;
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(162, 135, 255, 0.3); /* Neon Border */
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 850px;
            box-shadow: 0 0 40px rgba(111, 78, 240, 0.15), 
                        inset 0 0 20px rgba(162, 135, 255, 0.05);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .title { 
            font-size: 2.8rem; 
            color: var(--secondary-glow); 
            margin-bottom: 2rem; 
            text-align: center;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(162, 135, 255, 0.4);
        }

        /* --- INPUT GROUP --- */
        .input-group { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 30px; 
            background: rgba(255, 255, 255, 0.03);
            padding: 10px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            background: transparent;
            color: white;
            font-size: 1.1rem;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
            text-align: center; /* Teks di tengah */
        }

        input::placeholder {
            text-align: center;
            transition: opacity 0.3s ease;
        }

        button#add-btn {
            padding: 0 35px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary-glow), var(--secondary-glow));
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        button#add-btn:hover { 
            transform: scale(1.05); 
            box-shadow: 0 0 20px var(--primary-glow); 
        }

        /* --- LIST ITEMS --- */
        #todo-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 15px;
        }

        li {
            background: rgba(255, 255, 255, 0.04);
            margin-bottom: 15px;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
            font-family: 'JetBrains Mono', monospace;
        }

        li:hover {
            background: rgba(162, 135, 255, 0.08);
            border-color: var(--secondary-glow);
            box-shadow: 0 0 25px rgba(162, 135, 255, 0.2);
            transform: translateX(10px);
        }

        .timestamp { font-size: 0.7rem; color: var(--secondary-glow); opacity: 0.7; }
        .action-btns { display: flex; gap: 15px; }
        .check-btn { color: #4eff91; background: none; border: none; cursor: pointer; font-size: 1.2rem; }
        .del-btn { color: #ff4e4e; background: none; border: none; cursor: pointer; font-size: 1.2rem; }

        .empty-state { 
            text-align: center; 
            color: rgba(162, 135, 255, 0.6); 
            font-style: italic; 
            margin-top: 50px;
            text-shadow: 0 0 8px rgba(162, 135, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="stars-container" id="stars-box"></div>

    <div class="container">
        <div class="card">
            <h1 class="title">🌌 Dream Deck</h1>
            
            <div class="input-group">
                <input type="text" placeholder="" id="todo-input">
                <button id="add-btn">Launch</button>
            </div>

            <div id="todo-list">
                <div class="empty-state" id="empty-msg">
                    <p>🚀 No active missions. Ready to launch your next dream.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        // 1. Digital Dust
        const starsBox = document.getElementById('stars-box');
        for (let i = 0; i < 50; i++) {
            const dust = document.createElement('div');
            dust.className = 'dust';
            const size = Math.random() * 3 + 'px';
            dust.style.width = size; dust.style.height = size;
            dust.style.top = Math.random() * 100 + '%';
            dust.style.left = Math.random() * 100 + '%';
            dust.style.animationDelay = Math.random() * 3 + 's';
            starsBox.appendChild(dust);
        }

        // 2. Shooting Stars
        setInterval(() => {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.top = Math.random() * 50 + '%';
            star.style.left = Math.random() * 70 + '%';
            starsBox.appendChild(star);
            setTimeout(() => star.remove(), 3000);
        }, 2000);

        // 3. Typing Animation
        const input = document.getElementById('todo-input');
        const messages = [
            "What is your next dream?...",
            
        ];
        let msgIndex = 0, charIndex = 0, isDeleting = false;

        function typeEffect() {
            const currentMsg = messages[msgIndex];
            input.placeholder = isDeleting 
                ? currentMsg.substring(0, charIndex--) 
                : currentMsg.substring(0, charIndex++);

            if (!isDeleting && charIndex > currentMsg.length) {
                isDeleting = true;
                setTimeout(typeEffect, 2000);
            } else if (isDeleting && charIndex < 0) {
                isDeleting = false;
                msgIndex = (msgIndex + 1) % messages.length;
                setTimeout(typeEffect, 500);
            } else {
                setTimeout(typeEffect, isDeleting ? 50 : 100);
            }
        }
        typeEffect();

        // 4. Logic Add & Confetti
        const btn = document.getElementById('add-btn');
        const list = document.getElementById('todo-list');
        const emptyMsg = document.getElementById('empty-msg');

        btn.addEventListener('click', () => {
            if (input.value.trim() !== "") {
                if(emptyMsg) emptyMsg.style.display = 'none';
                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

                const li = document.createElement('li');
                li.innerHTML = `
                    <div style="display:flex; flex-direction:column;">
                        <span>${input.value}</span>
                        <span class="timestamp">📡 Logged at ${timeStr}</span>
                    </div>
                    <div class="action-btns">
                        <button class="check-btn" onclick="completeTask(this)">✓</button>
                        <button class="del-btn" onclick="this.parentElement.parentElement.remove(); checkEmpty();">✕</button>
                    </div>
                `;
                list.appendChild(li);
                input.value = "";
            }
        });

        function completeTask(btn) {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#6f4ef0', '#a287ff'] });
            const item = btn.parentElement.parentElement;
            item.style.opacity = '0.5';
            item.style.textDecoration = 'line-through';
            btn.remove();
        }

        function checkEmpty() {
            if (list.querySelectorAll('li').length === 0) emptyMsg.style.display = 'block';
        }
    </script>
</body>
</html>
